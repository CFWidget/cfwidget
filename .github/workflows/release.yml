name: Release
on:
  workflow_dispatch:

jobs:
  deployment:
    runs-on: ubuntu-latest
    environment:
      name: Prod
      url: https://www.cfwidget.com/
    env:
      REPO:
    steps:
      - name: Correct env
        run:
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Tag
        run: |
          docker pull ghcr.io/${{ env.REPO }}:dev
          docker tag ghcr.io/${{ env.REPO }}:dev ghcr.io/${{ env.REPO }}:latest
          docker push ghcr.io/${{ env.REPO }}:latest
          
      - name: Deploy
        run:
          curl --insecure -X POST ${{ secrets.POST_URL }}
